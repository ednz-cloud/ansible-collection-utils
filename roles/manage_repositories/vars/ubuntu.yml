---
# vars file for manage_repositories

# title: Default repository configuration for Ubuntu distributions.
# required: true
# description: This variable defines the default repositories for Ubuntu distributions.
manage_repositories_default_repo:
  - name: ubuntu
    uri: "{{ manage_repositories_main_repo_uri[ansible_facts['distribution'] | lower] }}"
    comments: "ubuntu main repository"
    types:
      - deb
    suites:
      - "{{ ansible_facts['distribution_release'] }}"
      - "{{ ansible_facts['distribution_release'] }}-security"
      - "{{ ansible_facts['distribution_release'] }}-updates"
      - "{{ ansible_facts['distribution_release'] }}-backports"
    components:
      - main
      - restricted
      - universe
      - multiverse
