---
# vars file for manage_repositories

# title: Default repository configuration for Debian distributions.
# required: true
# description: This variable defines the default repositories for Debian distributions.
manage_repositories_default_repo:
  - name: debian
    uri: "{{ manage_repositories_main_repo_uri[ansible_facts['distribution'] | lower] }}"
    comments: "debian main repository"
    types:
      - deb
    suites:
      - "{{ ansible_facts['distribution_release'] }}"
      - "{{ ansible_facts['distribution_release'] }}-updates"
      - "{{ ansible_facts['distribution_release'] }}-backports"
    components:
      - main
  - name: debian-security
    uri: "{{ manage_repositories_main_repo_uri[ansible_facts['distribution'] | lower] }}-security"
    comments: "debian main repository"
    types:
      - deb
    suites:
      - "{{ ansible_facts['distribution_release'] }}-security"
    components:
      - main
